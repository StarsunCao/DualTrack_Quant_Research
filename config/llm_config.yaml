# LLM 配置文件
# 配置 LLM Track 的模型参数

# 执行器配置
executors:
  ollama:
    name: "Ollama"
    type: "local"
    model: "qwen2.5:7b"
    base_url: "http://localhost:11434"
    timeout: 120
    temperature: 0.1
    max_tokens: 4096

  deepseek-v3.2:
