    temperature: 0.1
    max_tokens: 8192

  qwen3.5-9b:
    name: "Qwen3.5 9B"
    description: "Qwen3.5 9B (可部署版, 通过SiliconFlow API)"
    type: "cloud"
    model: "Qwen/Qwen3.5-9B"
    base_url: "https://api.siliconflow.cn/v1"
    timeout: 300
    temperature: 0.1
    max_tokens: 8192

  glm-5:
    name: "GLM-5"
    description: "GLM-5 (通过SiliconFlow API)"
    type: "cloud"
    model: "Pro/zai-org/GLM-5"
    base_url: "https://api.siliconflow.cn/v1"
    timeout: 300
    temperature: 0.1
    max_tokens: 8192

  glm-5-dashscope:
    name: "GLM-5 (DashScope)"
    description: "GLM-5 (通过阿里云 DashScope API)"
    type: "cloud"
    model: "glm-5"
    base_url: "https://coding.dashscope.aliyuncs.com/v1"
    timeout: 300
    temperature: 0.1
    max_tokens: 8192

  deepseek-v3.2-nvidia:
    name: "DeepSeek V3.2 (NVIDIA)"
    description: "DeepSeek V3.2 (通过 NVIDIA NIM API)"
    type: "cloud"
    model: "deepseek-ai/deepseek-v3.2"
