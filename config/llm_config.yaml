    max_tokens: 8192

  gemma-4-31b:
    name: "Gemma 4 31B IT (NVIDIA)"
    description: "Google Gemma 4 31B Instruct (通过 NVIDIA NIM API)"
    type: "cloud"
    model: "google/gemma-4-31b-it"
    base_url: "https://integrate.api.nvidia.com/v1"
    timeout: 300
    temperature: 0.1
    max_tokens: 8192

  qwen3.5-397b:
    name: "Qwen3.5 397B A17B (NVIDIA)"
    description: "Qwen/Qwen3.5-397B-A17B (通过 NVIDIA NIM API)"
