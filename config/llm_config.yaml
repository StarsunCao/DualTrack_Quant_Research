    type: "cloud"
    model: "deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"
    base_url: "https://api.siliconflow.cn/v1"
    timeout: 120
    temperature: 0.1
    max_tokens: 8192

  qwen3.5:
    name: "Qwen3.5 397B"
    description: "Qwen3.5 397B (满血版, 通过SiliconFlow API)"
    type: "cloud"
    model: "Qwen/Qwen3.5-397B-A17B"
